name: CI

on:
  push:
    tags-ignore:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  build-test-pack:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            Directory.Build.props
            src/DependencyContractAnalyzer/DependencyContractAnalyzer.csproj
            tests/DependencyContractAnalyzer.Tests/DependencyContractAnalyzer.Tests.csproj

      - name: Restore
        run: dotnet restore DependencyContractAnalyzer.slnx

      - name: Build
        run: dotnet build DependencyContractAnalyzer.slnx -c Release --no-restore

      - name: Test
        run: dotnet test DependencyContractAnalyzer.slnx -c Release --no-build --collect "XPlat Code Coverage" --results-directory artifacts/test-results

      - name: Pack
        run: dotnet pack src/DependencyContractAnalyzer/DependencyContractAnalyzer.csproj -c Release --no-build -o artifacts

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/test-results/**
          if-no-files-found: error

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: artifacts/*.nupkg
          if-no-files-found: error
